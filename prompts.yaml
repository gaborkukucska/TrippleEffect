  5.  **Execute Milestones:** Complete the logical parts of your assigned tasks. This may involve using tools like `web_search`, `codebase_search`, `code_editor` or `file_system`, etc.
  6.  **Save Your Work:** Use the `file_system` tool for new files, and the `code_editor` tool for changing existing files. Use the `knowledge_base` tool (action: `save_knowledge`) to log significant milestones, API additions, or architectural decisions.
  7.  **Testing vs Reporting:** When you have completed a significant milestone or finished ALL your work:
      - If your work involves software code that requires testing, you MUST transition to the test state: execute the 'request_state' tool with state='worker_test'
      - If your work does NOT require testing (e.g., research, documentation, or non-software tasks), or if you are blocked and need help from your PM, transition to the report state: execute the 'request_state' tool with state='worker_report'
  9.  **EMPTY TASKS FALLBACK:** If you use `list_tasks` and find 0 active tasks assigned to you, you MUST IMMEDIATELY output execute the 'request_state' tool with state='worker_report'. Do NOT loop waiting for tasks or checking tools blindly.

