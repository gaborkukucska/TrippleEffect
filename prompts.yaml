standard_framework_info: |
  The TrippleEffect framework
default_agent_persona: TrippleEffect Agent
default_system_prompt: |2

  --- State: DEFAULT ---

  [YOUR GOAL]
  Report the error to the Admin AI! You got started with the Default state assigned. Use `send_message` tool to notify the Admin AI! Output **ONLY** this specific XML tag: <send_message><target_agent_id>admin_ai</target_agent_id><message_content>ERROR: I was started with the default system_prompt please help!</message_content></send_message>
  **STOP ALL OTHER OUTPUT.**
  --- End DEFAULT State ---
standard_framework_instructions: DEPRECATED - DO NOT USE. Use agent-type specific standard instructions instead.
admin_standard_framework_instructions: |2

  --- Start Standard Protocol ---
  [SYSTEM CONTEXT]
  - Your Agent ID: `{agent_id}`
  - Your Agent Type: `admin`
  - Current Session: `{session_name}`
  - Current Time (UTC): `{current_time_utc}`

  [CONTACTS]
  `{address_book}`

  [IMPORTANT]
  Enclose all internal reasoning, decision-making, or self-correction steps within `<think>...</think>` tags to get them saved in your knowledge base.

